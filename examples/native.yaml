# Native Devnet (supervisord)
#
# Runs validators as native OS processes via supervisord (no Docker).
# Every validator has its own data directory under ./data/<moniker>.
# Good for local development where you want direct access to node logs,
# process-level debugging, or resource profiling.
#
# P2P on localhost (private), RPC on all interfaces (LAN accessible).
#
# Prerequisites:
#   cargo build --profile profiling --bin tempo
#   cargo build --profile profiling --bin tempo-xtask
#   export PATH=$PWD/target/profiling:$PATH
#
# Usage:
#   tempo-devnet serve --data ./data --config examples/native.yaml

chain_id: 1337
accounts: 100
epoch_length: 100
gas_limit: 500000000
seed: 42

validators:
  - host: 127.0.0.1
    port: 8000
    moniker: node0
    rpc_host: 0.0.0.0

  - host: 127.0.0.1
    port: 8010
    moniker: node1
    rpc_host: 0.0.0.0

  - host: 127.0.0.1
    port: 8020
    moniker: node2
    rpc_host: 0.0.0.0
