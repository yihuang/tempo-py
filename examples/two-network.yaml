# Two-Network Production Topology
#
# Validators isolated on a private network; follow nodes and P2P proxies
# bridge to a public-facing network.  Emulates a real production deployment.
#
# Network Layout:
#
#   Validator Network (10.88.0.0/24)     Public Network (10.89.0.0/24)
#   ┌──────────────────────────────┐    ┌──────────────────────────────────┐
#   │ node0 (10.88.0.10)           │    │ follower0 (10.89.0.13)           │
#   │   P2P + RPC + WS (internal) │WS──┤   RPC/WS for external users     │
#   │ node1 (10.88.0.11)           │    │   --follow ws://10.88.0.10      │
#   │ node2 (10.88.0.12)           │    │                                  │
#   │ validator network only             │    │ proxy0 (10.89.0.14)             │
#   │ no public network access            │RPC─┤   p2p-proxy for external peers  │
#   └──────────────────────────────┘    └──────────────────────────────────┘
#
# Published ports on host:
#   node0     HTTP :8004  WS :8005
#   node1     HTTP :8014  WS :8015
#   node2     HTTP :8024  WS :8025
#   follower0 HTTP :9004  WS :9005
#   proxy0    P2P  :7001
#
# Usage:
#   tempo-devnet init --data ./data --config examples/two-network.yaml --gen-compose-file
#   docker compose -f ./data/docker-compose.yaml up -d
#
# Prerequisites:
#   cargo build --profile profiling --bin tempo-xtask
#   docker buildx bake tempo --load
#   export PATH=$PWD/target/profiling:$PATH

chain_id: 1337
accounts: 100
epoch_length: 100
gas_limit: 500000000
seed: 42

validators:
  - host: 127.0.0.1
    port: 8000
    moniker: node0
  - host: 127.0.0.1
    port: 8010
    moniker: node1
  - host: 127.0.0.1
    port: 8020
    moniker: node2

no_dkg_in_genesis: true

docker:
  image: ghcr.io/tempoxyz/tempo:latest

  # Private validator network — P2P and internal RPC/WS
  validator_network:
    name: tempo-validator-net
    subnet: 10.88.0.0/24

  # Public-facing network — external RPC/WS and P2P
  public_network:
    name: tempo-public-net
    subnet: 10.89.0.0/24

  # Read-only follow node (syncs from validator0 via WS on validator network)
  follow_nodes:
    - moniker: follower0
      port: 9000

  # P2P proxy (serves block data, syncs from validator0 via RPC on validator network)
  p2p_proxies:
    - moniker: proxy0
      port: 7000
